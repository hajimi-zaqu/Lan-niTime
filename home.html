<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan-niTime 平台</title>
    <style>
        /* --- 保持你喜欢的极简渐变风格 --- */
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fcfcfc; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .app-container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-circle { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #43cea2, #185a9d, #f3904f); margin: 0 auto 15px; box-shadow: 0 8px 20px rgba(67, 206, 162, 0.3); }
        .logo-text { font-size: 24px; font-weight: 300; background: linear-gradient(to right, #43cea2, #f3904f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 登录/验证卡片 */
        .auth-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #eee; border-radius: 8px; font-size: 15px; outline: none; }
        input:focus { border-color: #43cea2; }
        button { width: 100%; padding: 12px; margin-top: 15px; background-color: #333; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background-color: #555; }
        .toggle-link { margin-top: 15px; font-size: 13px; color: #666; cursor: pointer; text-decoration: underline; }

        /* 主界面与项目卡片 */
        #main-app { display: none; }
        .project-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .project-title { font-size: 17px; font-weight: 600; margin-bottom: 15px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .content-area { font-size: 14px; line-height: 1.6; color: #555; min-height: 20px; word-break: break-all; }
        
        /* 官方专属操作区 */
        .admin-controls { display: none; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 15px; background: #fafafa; padding: 10px; border-radius: 8px; }
        .admin-btn { background-color: #43cea2; font-size: 13px; padding: 8px; margin-top: 8px; }
        .admin-btn.orange { background-color: #f3904f; }
        
        /* 视频与链接样式 */
        .video-item { margin-bottom: 20px; border-bottom: 1px solid #f9f9f9; padding-bottom: 15px; }
        .video-title { font-weight: bold; margin-bottom: 8px; color: #333; font-size: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 8px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .link-tag { display: inline-block; background: #f0f0f0; padding: 6px 12px; border-radius: 6px; margin: 4px 2px; font-size: 13px; color: #333; text-decoration: none; transition: 0.2s; }
        .link-tag:hover { background: #e0e0e0; }
        .logout-btn { background: transparent; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-section">
            <div class="logo-circle"></div>
            <div class="logo-text">Lan-niTime</div>
        </div>

        <!-- 1. 登录/注册界面 -->
        <div id="auth-screen" class="auth-card">
            <h2 id="form-title" style="margin-top:0;">欢迎回来</h2>
            <input type="text" id="username" placeholder="用户名" />
            <input type="password" id="password" placeholder="密码" />
            <button onclick="handleLogin()" id="submit-btn">登录</button>
            <div class="toggle-link" onclick="toggleMode()"><span id="toggle-text">还没有账号？点击注册</span></div>
        </div>

        <!-- 2. 官方专属：二次加密验证框 -->
        <div id="secondary-auth" class="auth-card" style="display:none; border: 2px solid #f3904f;">
            <h2 style="color:#f3904f; margin-top:0;">官方二次加密验证</h2>
            <p style="font-size:13px; color:#666;">检测到官方账号，请输入服务器下发的动态口令</p>
            <input type="text" id="dynamic-token-input" placeholder="输入动态口令" />
            <button class="admin-btn orange" onclick="verifySecondaryAuth()">验证并进入后台</button>
        </div>

        <!-- 3. 主应用界面（包含你的三大项目） -->
        <div id="main-app">
            
            <!-- 项目 1: Jubilee Proclamation (官方发视频) -->
            <div class="project-card">
                <div class="project-title">Jubilee Proclamation</div>
                <div id="jp-content" class="content-area">
                    <p style="color:#999; font-style:italic;">暂无官方视频发布。</p>
                </div>
                <!-- 官方专属：发视频 -->
                <div class="admin-controls">
                    <input type="text" id="jp-video-title" placeholder="输入视频标题" />
                    <input type="text" id="jp-video-url" placeholder="输入视频嵌入链接 (iframe src)" />
                    <button class="admin-btn" onclick="postVideo()">发布视频</button>
                </div>
            </div>

            <!-- 项目 2: Axio for Old Phone (官方写内容/自动识别网址) -->
            <div class="project-card">
                <div class="project-title">Axio for Old Phone</div>
                <div id="axio-content" class="content-area">
                    <p style="color:#999; font-style:italic;">暂无官方内容。</p>
                </div>
                <!-- 官方专属：编辑内容 -->
                <div class="admin-controls">
                    <textarea id="axio-text-input" rows="3" placeholder="输入内容 (如果输入的是网址会自动变链接)"></textarea>
                    <button class="admin-btn" onclick="postAxioContent()">发布/更新内容</button>
                </div>
            </div>

            <!-- 项目 3: Lan-Store (官方添加下载链接) -->
            <div class="project-card">
                <div class="project-title">Lan-Store</div>
                <div id="store-content" class="content-area">
                    <p style="color:#999; font-style:italic;">暂无下载资源。</p>
                </div>
                <!-- 官方专属：添加下载 -->
                <div class="admin-controls">
                    <input type="text" id="store-link-name" placeholder="软件/资源名称" />
                    <input type="text" id="store-link-url" placeholder="下载链接 (http://...)" />
                    <button class="admin-btn" onclick="addDownloadLink()">添加下载链接</button>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api'; // 后端接口地址
        let currentUser = {}; 
        let isLoginMode = true;

        // 切换 登录/注册 模式
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? '欢迎回来' : '注册新账号';
            document.getElementById('submit-btn').innerText = isLoginMode ? '登录' : '注册';
            document.getElementById('toggle-text').innerText = isLoginMode ? '还没有账号？点击注册' : '已有账号？点击登录';
        }

        // 注册
        async function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if(!username || !password) return alert("请输入用户名和密码");
            const res = await fetch(`${API_URL}/register`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message);
        }

        // 登录（第一层）
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if(!username || !password) return alert("请输入用户名和密码");
            
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                currentUser = { username, password };
                if (data.needSecondaryAuth) {
                    // 官方账号：进入二次加密验证界面
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('secondary-auth').style.display = 'block';
                } else {
                    // 普通用户：直接进入主界面，但隐藏所有编辑按钮
                    enterMainApp(false);
                }
            } else {
                alert(data.message);
            }
        }

        // 官方二次验证（第二层）
        async function verifySecondaryAuth() {
            const inputToken = document.getElementById('dynamic-token-input').value;
            const res = await fetch(`${API_URL}/get-dynamic-token`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(currentUser)
            });
            const data = await res.json();

            if (data.success && inputToken === data.token) {
                // 验证通过，进入主界面，并显示所有官方编辑按钮
                enterMainApp(true);
            } else {
                alert('动态口令错误或已失效！');
            }
        }

        // 进入主界面并加载数据
        function enterMainApp(isOfficial) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('secondary-auth').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // 如果是官方，显示所有 .admin-controls；如果是普通人，全部隐藏
            document.querySelectorAll('.admin-controls').forEach(el => {
                el.style.display = isOfficial ? 'block' : 'none';
            });

            loadProjectData(); // 加载三个项目的真实数据
        }

        function logout() {
            currentUser = {};
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // ================= 项目功能与后端交互 =================

        // 加载三个项目的数据
        async function loadProjectData() {
            const res = await fetch(`${API_URL}/get-data`);
            const data = await res.json();
            
            // 渲染 Jubilee Proclamation 视频
            const jpContainer = document.getElementById('jp-content');
            if (data.jpVideos && data.jpVideos.length > 0) {
                jpContainer.innerHTML = data.jpVideos.map(v => `
                    <div class="video-item">
                        <div class="video-title">${v.title}</div>
                        <div class="video-container"><iframe src="${v.url}" allowfullscreen></iframe></div>
                    </div>`).join('');
            }

            // 渲染 Axio 内容 (自动识别网址)
            const axioContainer = document.getElementById('axio-content');
            if (data.axioContent) {
                let html = data.axioContent.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:#43cea2;">[点击访问] ${url}</a>`);
                axioContainer.innerHTML = html;
            }

            // 渲染 Lan-Store 下载链接
            const storeContainer = document.getElementById('store-content');
            if (data.storeLinks && data.storeLinks.length > 0) {
                storeContainer.innerHTML = data.storeLinks.map(l => `<a href="${l.url}" class="link-tag" target="_blank">📥 下载: ${l.name}</a>`).join('');
            }
        }

        // 官方功能：发布视频
        async function postVideo() {
            const title = document.getElementById('jp-video-title').value;
            const url = document.getElementById('jp-video-url').value;
            if(!title || !url) return alert("请填写完整");
            await fetch(`${API_URL}/update-data`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'jpVideos', data: { title, url } })
            });
            document.getElementById('jp-video-title').value = '';
            document.getElementById('jp-video-url').value = '';
            loadProjectData();
        }

        // 官方功能：发布 Axio 内容
        async function postAxioContent() {
            const text = document.getElementById('axio-text-input').value;
            if(!text) return alert("请输入内容");
            await fetch(`${API_URL}/update-data`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'axioContent', data: text })
            });
            document.getElementById('axio-text-input').value = '';
            loadProjectData();
        }

        // 官方功能：添加下载链接
        async function addDownloadLink() {
            const name = document.getElementById('store-link-name').value;
            const url = document.getElementById('store-link-url').value;
            if(!name || !url) return alert("请填写完整");
            await fetch(`${API_URL}/update-data`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'storeLinks', data: { name, url } })
            });
            document.getElementById('store-link-name').value = '';
            document.getElementById('store-link-url').value = '';
            loadProjectData();
     </script>

<!-- 强制结束脚本，开始渲染页面 -->
</body>
</html>   }
