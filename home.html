<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan-niTime</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
            font-weight: 600;
        }

        :root {
            --color-start: #4a90a4;
            --color-green: #43b05c;
            --color-yellow: #f9d342;
            --color-orange: #ff7e29;
            --grad-full: linear-gradient(90deg, var(--color-start), var(--color-green), var(--color-yellow), var(--color-orange));
            --grad-circle: linear-gradient(135deg, var(--color-start), var(--color-green), var(--color-yellow), var(--color-orange));
            --bg-grad-body: linear-gradient(135deg, #d0e4ff, #b8d4ff, #9fc5ff);
            --text-dark: #2d3748;
            --text-light: #5a6574;
            --border: rgba(255, 255, 255, 0.35);
        }

        body {
            background: var(--bg-grad-body);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .top-nav {
            width: 100%;
            height: 56px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--grad-circle);
        }
        .logo-text {
            font-size: 18px;
            background: var(--grad-full);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--grad-full);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .user-name {
            font-size: 14px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1180px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .page { display: none; }
        .page.active { display: block; }

        .form-wrap {
            max-width: 400px;
            margin: 4rem auto;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 80, 200, 0.15);
        }
        .form-title {
            font-size: 20px;
            margin-bottom: 1.8rem;
            background: var(--grad-full);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-item {
            margin-bottom: 1.2rem;
        }
        .form-item label {
            display: block;
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .form-item input,
        .form-item textarea,
        .form-item select {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px) saturate(150%);
            -webkit-backdrop-filter: blur(10px) saturate(150%);
        }
        .form-item textarea {
            height: 100px;
            padding-top: 10px;
            resize: none;
        }

        .btn-primary {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            background: var(--grad-full);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-default {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dark);
        }
        .btn-add-proj {
            background: var(--grad-full);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .proj-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .proj-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px) saturate(190%);
            -webkit-backdrop-filter: blur(18px) saturate(190%);
            padding: 1.6rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 24px rgba(0, 70, 180, 0.12);
        }
        .proj-card:hover {
            box-shadow: 0 10px 36px rgba(0, 60, 160, 0.18);
        }
        .proj-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            background: var(--grad-full);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .proj-card p {
            font-size: 13px;
            color: var(--text-light);
        }

        .content-item {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px) saturate(190%);
            -webkit-backdrop-filter: blur(18px) saturate(190%);
            padding: 1.2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            box-shadow: 0 6px 24px rgba(0, 70, 180, 0.12);
        }
        .content-item h4 {
            font-size: 15px;
            margin-bottom: 6px;
            background: var(--grad-full);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .content-item p {
            font-size: 14px;
            color: var(--text-light);
        }
        .content-item a {
            color: #2468d8;
            text-decoration: none;
        }

        .publish-box {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 80, 200, 0.15);
        }

        @media (max-width: 768px) {
            .top-nav { padding: 0 1rem; }
            .container { padding: 0 1rem; }
            .proj-grid { grid-template-columns: 1fr; }
            .user-name { display: none; }
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-circle"></div>
            <div class="logo-text">Lan-niTime</div>
        </div>
        <div class="nav-right" id="userNav">
            <button class="btn-default" onclick="showPage('loginPage')">登录</button>
        </div>
    </header>

    <div class="container">
        <div id="loginPage" class="page active">
            <div class="form-wrap">
                <h2 class="form-title">账号登录</h2>
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="loginPwd" placeholder="请输入密码">
                </div>
                <button class="btn-primary" onclick="login()">登录</button>
                <div style="margin-top:1rem;text-align:center;font-size:13px;">
                    没有账号？<a href="#" onclick="showPage('regPage')">立即注册</a>
                </div>
            </div>
        </div>

        <div id="regPage" class="page">
            <div class="form-wrap">
                <h2 class="form-title">账号注册</h2>
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="regUser" placeholder="设置用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="regPwd" placeholder="设置密码">
                </div>
                <div class="form-item">
                    <label>确认密码</label>
                    <input type="password" id="regPwd2" placeholder="再次输入密码">
                </div>
                <button class="btn-primary" onclick="register()">注册</button>
                <div style="margin-top:1rem;text-align:center;font-size:13px;">
                    已有账号？<a href="#" onclick="showPage('loginPage')">返回登录</a>
                </div>
            </div>
        </div>

        <div id="homePage" class="page">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2 style="font-size:20px;background:var(--grad-full);-webkit-background-clip:text;background-clip:text;color:transparent;">项目列表</h2>
                <button class="btn-add-proj" id="addProjBtn" onclick="showPage('newProjPage')">+ 新增项目</button>
            </div>
            <div class="proj-grid" id="projContainer"></div>
        </div>

        <div id="newProjPage" class="page">
            <div class="form-wrap">
                <h2 class="form-title">新建项目</h2>
                <div class="form-item">
                    <label>项目名称</label>
                    <input type="text" id="newProjName" placeholder="输入项目名">
                </div>
                <div class="form-item">
                    <label>项目描述</label>
                    <input type="text" id="newProjDesc" placeholder="简单描述">
                </div>
                <div class="form-item">
                    <label>项目类型</label>
                    <select id="newProjType">
                        <option value="video">视频发布项目</option>
                        <option value="text">文字内容项目</option>
                        <option value="store">下载链接项目</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="createProj()">创建项目</button>
                <div style="margin-top:1rem;text-align:center">
                    <button class="btn-default" onclick="showPage('homePage')">返回</button>
                </div>
            </div>
        </div>

        <div id="dynPageBox"></div>
    </div>

    <script>
        // 后端服务器地址
        const baseUrl = "http://localhost:3000/api";
        let currentUser = null;

        // 页面切换
        function showPage(id){
            document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        // 注册
        async function register(){
            let username = document.getElementById("regUser").value.trim();
            let password = document.getElementById("regPwd").value.trim();
            let pwd2 = document.getElementById("regPwd2").value.trim();

            if(!username || !password) return alert("请填写完整");
            if(password !== pwd2) return alert("两次密码不一致");

            let res = await axios.post(baseUrl + "/register", {username,password});
            if(res.data.code === 1){
                alert("注册成功，请登录");
                showPage("loginPage");
            }else{
                alert(res.data.msg);
            }
        }

        // 登录
        async function login(){
            let username = document.getElementById("loginUser").value.trim();
            let password = document.getElementById("loginPwd").value.trim();

            if(!username || !password) return alert("请填写完整");

            let res = await axios.post(baseUrl + "/login", {username,password});
            if(res.data.code === 1){
                currentUser = res.data.data;
                renderUserNav();
                showPage("homePage");
                loadProjects();
            }else{
                alert(res.data.msg);
            }
        }

        // 退出登录
        function logout(){
            currentUser = null;
            document.getElementById("userNav").innerHTML = `<button class="btn-default" onclick="showPage('loginPage')">登录</button>`;
            showPage("loginPage");
        }

        // 渲染导航用户栏
        function renderUserNav(){
            let html = `
                <div class="user-avatar">${currentUser.username.slice(0,2).toUpperCase()}</div>
                <span class="user-name">${currentUser.username}</span>
                <button class="btn-default" onclick="logout()">退出</button>
            `;
            document.getElementById("userNav").innerHTML = html;
            document.getElementById("addProjBtn").style.display = "inline-block";
        }

        // 加载所有项目（从云端读取）
        async function loadProjects(){
            let res = await axios.get(baseUrl + "/projects");
            let list = res.data.data;
            let box = document.getElementById("projContainer");
            box.innerHTML = "";

            list.forEach(item=>{
                let card = document.createElement("div");
                card.className = "proj-card";
                card.onclick = ()=>openProject(item.id, item.type);
                card.innerHTML = `
                    <h3>${item.name}</h3>
                    <p>${item.desc || "暂无描述"}</p>
                `;
                box.appendChild(card);
            });
        }

        // 新建项目（提交到云端数据库）
        async function createProj(){
            let name = document.getElementById("newProjName").value.trim();
            let desc = document.getElementById("newProjDesc").value.trim();
            let type = document.getElementById("newProjType").value;

            if(!name) return alert("请输入项目名称");

            await axios.post(baseUrl + "/project/add", {name,desc,type});
            alert("创建成功");
            showPage("homePage");
            loadProjects();
        }

        // 打开项目，加载对应内容
        async function openProject(pid, type){
            let res = await axios.get(baseUrl + "/contents/" + pid);
            let list = res.data.data;

            let head = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
                    <h2 style="font-size:20px;background:var(--grad-full);-webkit-background-clip:text;background-clip:text;color:transparent;">项目内容管理</h2>
                    <button class="btn-default" onclick="showPage('homePage')">返回首页</button>
                </div>
            `;

            let publishHtml = "";
            if(type === "video"){
                publishHtml = `
                <div class="publish-box">
                    <div class="form-item">
                        <label>视频标题</label>
                        <input type="text" id="in_vtitle" placeholder="填写标题">
                    </div>
                    <div class="form-item">
                        <label>视频链接</label>
                        <input type="text" id="in_vurl" placeholder="粘贴视频地址">
                    </div>
                    <button class="btn-primary" onclick="addVideoContent(${pid})">发布视频</button>
                </div>
                `;
            }
            if(type === "text"){
                publishHtml = `
                <div class="publish-box">
                    <div class="form-item">
                        <label>内容标题</label>
                        <input type="text" id="in_ttitle" placeholder="填写标题">
                    </div>
                    <div class="form-item">
                        <label>正文内容</label>
                        <textarea id="in_tcont"></textarea>
                    </div>
                    <button class="btn-primary" onclick="addTextContent(${pid})">发布内容</button>
                </div>
                `;
            }
            if(type === "store"){
                publishHtml = `
                <div class="publish-box">
                    <div class="form-item">
                        <label>资源名称</label>
                        <input type="text" id="in_sname" placeholder="文件名">
                    </div>
                    <div class="form-item">
                        <label>下载链接</label>
                        <input type="text" id="in_surl" placeholder="资源地址">
                    </div>
                    <button class="btn-primary" onclick="addStoreContent(${pid})">添加链接</button>
                </div>
                `;
            }

            let listHtml = `<div class="list-wrap">`;
            list.forEach(d=>{
                if(type==="video"){
                    listHtml += `
                    <div class="content-item">
                        <h4>${d.title}</h4>
                        <p><a href="${d.url}" target="_blank">打开视频链接</a></p>
                    </div>
                    `;
                }
                if(type==="text"){
                    let cont = (d.content||"").replace(/(https?:\/\/\S+)/g,'<a href="$1" target="_blank">$1</a>');
                    listHtml += `
                    <div class="content-item">
                        <h4>${d.title}</h4>
                        <p>${cont}</p>
                    </div>
                    `;
                }
                if(type==="store"){
                    listHtml += `
                    <div class="content-item">
                        <h4>${d.title}</h4>
                        <p><a href="${d.url}" target="_blank">立即下载</a></p>
                    </div>
                    `;
                }
            });
            listHtml += `</div>`;

            let pageDom = document.createElement("div");
            pageDom.className = "page active";
            pageDom.innerHTML = head + publishHtml + listHtml;

            document.getElementById("dynPageBox").innerHTML = "";
            document.getElementById("dynPageBox").appendChild(pageDom);
            showPage("dynPageBox");
        }

        // 新增各类内容 提交云端
        async function addVideoContent(pid){
            let title = document.getElementById("in_vtitle").value.trim();
            let url = document.getElementById("in_vurl").value.trim();
            if(!title||!url) return alert("请填写完整");
            await axios.post(baseUrl + "/content/add", {pid,title,url,content:""});
            openProject(pid,"video");
        }
        async function addTextContent(pid){
            let title = document.getElementById("in_ttitle").value.trim();
            let content = document.getElementById("in_tcont").value.trim();
            if(!title||!content) return alert("请填写完整");
            await axios.post(baseUrl + "/content/add", {pid,title,content,url:""});
            openProject(pid,"text");
        }
        async function addStoreContent(pid){
            let title = document.getElementById("in_sname").value.trim();
            let url = document.getElementById("in_surl").value.trim();
            if(!title||!url) return alert("请填写完整");
            await axios.post(baseUrl + "/content/add", {pid,title,url,content:""});
            openProject(pid,"store");
        }
    </script>
</body>
</html>
